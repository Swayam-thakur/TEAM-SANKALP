name: quickseva
description: Urban services marketplace with user and worker role-based flows.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.3
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.2.0
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/

